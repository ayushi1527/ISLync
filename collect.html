<!DOCTYPE html>
<html>
<head>
  <title>ISLync Data Collector</title>
</head>

<body>

<h2>ISLync Data Collector</h2>

<input id="label" placeholder="Enter gesture (HELLO)">
<br><br>

<button onclick="start()">Start Recording</button>
<button onclick="stop()">Stop & Download</button>

<br><br>
<p id="status">Idle</p>

<!-- Camera Display -->
<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas" width="400" height="300"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
let data = [];
let currentLabel = "";
let recording = false;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// -------- Recording Controls --------

function start() {
  currentLabel = document.getElementById("label").value;

  if (!currentLabel) {
    alert("Enter a label first");
    return;
  }

  recording = true;
  document.getElementById("status").innerText = "Recording: " + currentLabel;
}

function stop() {
  recording = false;
  document.getElementById("status").innerText = "Stopped";

  const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "dataset.json";
  a.click();
}

// -------- MediaPipe Setup --------

const hands = new Hands({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults((results) => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // draw video frame
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  if (!results.multiHandLandmarks.length) return;

  const lm = results.multiHandLandmarks[0];

  // draw hand skeleton (visual feedback)
  drawConnectors(ctx, lm, HAND_CONNECTIONS, { color: "#00FF00" });
  drawLandmarks(ctx, lm, { color: "#FF0000" });

  // record only when active
  if (!recording) return;

  let features = [];
  lm.forEach(p => {
    features.push(p.x, p.y, p.z);
  });

  data.push({
    label: currentLabel,
    features: features
  });
});

// -------- Camera --------

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 400,
  height: 300
});

camera.start();

</script>

</body>
</html>
